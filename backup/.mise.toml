[tools]
node = "22"
uv = "0.11.21"
"npm:dockerfile-language-server-nodejs" = "0.15.0"
"npm:pyright" = "1.1.410"
"npm:typescript" = "5.5.2"
"npm:typescript-language-server" = "4.3.3"
"npm:vscode-langservers-extracted" = "4.10.0"
"npm:yaml-language-server" = "1.23.0" 
"npm:eslint" = "10.5.0"
#ruff = "0.15.17"
"github:google-antigravity/antigravity-cli" = "1.0.9"

[env]
# Tell mise to explicitly read variables from the local .env file
_.file = ".env"
ELECTRON_ENABLE_LOGGING="1"
#ANTIGRAVITY_API_KEY="XXXX"
# Your Git settings
#GIT_TOKEN = "ghp_XXXX"
GIT_CONFIG_COUNT = "2"
GIT_CONFIG_KEY_0 = "url.https://${GIT_USER}:${GIT_TOKEN}@github.com/.insteadOf"
GIT_CONFIG_VALUE_0 = "https://github.com/"
GIT_CONFIG_KEY_1 = "url.https://${GIT_USER}:${GIT_TOKEN}@gist.github.com/.insteadOf"
GIT_CONFIG_VALUE_1 = "https://gist.github.com/"


# Adding local binary paths to PATH so that Kate can see them
_.path = [
  "./node_modules/.bin",
  "./.venv/bin"
]

[tasks.antigravity-ide]
description = "Launch Antigravity IDE in current context"
run = "/work/google/antigravity/antigravity-ide/bin/antigravity-ide --no-sandbox"
